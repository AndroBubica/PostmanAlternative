name: Portable desktop packages

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  package:
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: Windows-x64
            target: x86_64-pc-windows-msvc
            test_target: x86_64-pc-windows-msvc
            archive: API-Lantern-Windows-x64.zip
          - os: macos-14
            name: macOS-universal
            target: universal-apple-darwin
            test_target: aarch64-apple-darwin
            archive: API-Lantern-macOS-universal.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'universal-apple-darwin' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.target }}
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: cargo test --manifest-path src-tauri/Cargo.toml --target ${{ matrix.test_target }}
      - run: pnpm tauri build --target ${{ matrix.target }}
      - name: Assemble Windows portable package
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $root = "release/API-Lantern"
          New-Item -ItemType Directory -Force "$root/Windows-x64/runtime", "$root/macOS", "$root/workspace", "$root/exports" | Out-Null
          New-Item -ItemType File -Force "$root/portable.flag" | Out-Null
          Copy-Item "src-tauri/target/${{ matrix.target }}/release/api-lantern.exe" "$root/Windows-x64/api-lantern.exe"
          Copy-Item "packaging/Start-Windows.cmd", "packaging/Start-macOS.command" $root
          Copy-Item "packaging/PORTABLE-README.txt" "$root/README.txt"
          tar.exe -a -c -f "${{ matrix.archive }}" -C release API-Lantern
          (Get-FileHash "${{ matrix.archive }}" -Algorithm SHA256).Hash.ToLower() + "  ${{ matrix.archive }}" | Set-Content "${{ matrix.archive }}.sha256"
      - name: Verify Windows portable package
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $verify = "release/verify-windows"
          Expand-Archive "${{ matrix.archive }}" -DestinationPath $verify
          $root = "$verify/API-Lantern"
          @(
            "$root/portable.flag",
            "$root/Start-Windows.cmd",
            "$root/README.txt",
            "$root/Windows-x64/api-lantern.exe",
            "$root/workspace",
            "$root/exports"
          ) | ForEach-Object {
            if (-not (Test-Path $_)) { throw "Missing portable package entry: $_" }
          }
          $expected = (Get-Content "${{ matrix.archive }}.sha256").Split()[0]
          $actual = (Get-FileHash "${{ matrix.archive }}" -Algorithm SHA256).Hash.ToLower()
          if ($actual -ne $expected) { throw "Portable package checksum mismatch." }
          $process = Start-Process -FilePath "$root/Windows-x64/api-lantern.exe" -PassThru
          Start-Sleep -Seconds 5
          if (-not $process.HasExited) { Stop-Process -Id $process.Id }
          if (-not (Test-Path "$root/workspace/api-lantern.json")) {
            throw "Packaged Windows app did not create its portable workspace."
          }
      - name: Assemble macOS portable package
        if: runner.os == 'macOS'
        run: |
          bash scripts/create-portable-layout.sh
          cp -R "src-tauri/target/${{ matrix.target }}/release/bundle/macos/API Lantern.app" "release/API-Lantern/macOS/"
          ditto -c -k --norsrc --noextattr --noqtn --noacl --keepParent "release/API-Lantern" "${{ matrix.archive }}"
          shasum -a 256 "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256"
      - name: Verify macOS portable package
        if: runner.os == 'macOS'
        run: |
          shasum -a 256 -c "${{ matrix.archive }}.sha256"
          rm -rf release/verify-macos
          ditto -x -k "${{ matrix.archive }}" release/verify-macos
          test -f "release/verify-macos/API-Lantern/portable.flag"
          test -x "release/verify-macos/API-Lantern/Start-macOS.command"
          test -f "release/verify-macos/API-Lantern/README.txt"
          test -x "release/verify-macos/API-Lantern/macOS/API Lantern.app/Contents/MacOS/api-lantern"
          test -d "release/verify-macos/API-Lantern/workspace"
          test -d "release/verify-macos/API-Lantern/exports"
          archs="$(lipo -archs "release/verify-macos/API-Lantern/macOS/API Lantern.app/Contents/MacOS/api-lantern")"
          [[ "$archs" == *x86_64* && "$archs" == *arm64* ]]
          "release/verify-macos/API-Lantern/macOS/API Lantern.app/Contents/MacOS/api-lantern" &
          app_pid=$!
          sleep 5
          kill "$app_pid" 2>/dev/null || true
          test -f "release/verify-macos/API-Lantern/workspace/api-lantern.json"
      - uses: actions/upload-artifact@v4
        with:
          name: API-Lantern-${{ matrix.name }}
          path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256
